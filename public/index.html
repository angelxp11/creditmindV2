<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />

    <!-- Favicon -->

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Tema -->
    <meta name="theme-color" content="#06b6d4" />

    <!-- SEO -->
    <title>CreditMind - Finanzas Inteligentes</title>

    <meta

      content="Gestiona tus finanzas personales, controla gastos, analiza ingresos y toma mejores decisiones financieras con CreditMind."

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->

      content="Controla tus gastos, ingresos y metas financieras desde cualquier dispositivo."

      name="twitter:description"
      content="Administra tus finanzas personales de forma inteligente."
    />

    <!-- iOS -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

    <!-- PWA -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Color barra navegador móvil -->
    <meta name="apple-mobile-web-app-capable" content="yes" />

      name="apple-mobile-web-app-title"
      content="CreditMind"
    />
    <meta
      name="apple-mobile-web-app-status-bar-style"
